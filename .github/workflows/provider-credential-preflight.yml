name: Provider Credential Preflight

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/provider-credential-preflight.yml'

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    env:
      DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
      DO_API_TOKEN: ${{ secrets.DO_API_TOKEN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID_SECRET: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_ACCOUNT_ID_SECRET: ${{ secrets.CF_ACCOUNT_ID }}
      CLOUDFLARE_PAGES_PROJECT_SECRET: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
      CF_PAGES_PROJECT_SECRET: ${{ secrets.CF_PAGES_PROJECT }}
      DIGITALOCEAN_APP_ID_SECRET: ${{ secrets.DIGITALOCEAN_APP_ID }}
      CLOUDFLARE_ACCOUNT_ID_VAR: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CF_ACCOUNT_ID_VAR: ${{ vars.CF_ACCOUNT_ID }}
      CLOUDFLARE_PAGES_PROJECT_VAR: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
      CF_PAGES_PROJECT_VAR: ${{ vars.CF_PAGES_PROJECT }}
      DIGITALOCEAN_APP_ID_VAR: ${{ vars.DIGITALOCEAN_APP_ID }}
    steps:
      - name: Report credential-name availability without values
        shell: bash
        run: |
          set -euo pipefail
          for name in \
            DIGITALOCEAN_ACCESS_TOKEN DIGITALOCEAN_TOKEN DO_API_TOKEN \
            CLOUDFLARE_API_TOKEN CF_API_TOKEN \
            CLOUDFLARE_ACCOUNT_ID_SECRET CF_ACCOUNT_ID_SECRET \
            CLOUDFLARE_PAGES_PROJECT_SECRET CF_PAGES_PROJECT_SECRET \
            DIGITALOCEAN_APP_ID_SECRET \
            CLOUDFLARE_ACCOUNT_ID_VAR CF_ACCOUNT_ID_VAR \
            CLOUDFLARE_PAGES_PROJECT_VAR CF_PAGES_PROJECT_VAR \
            DIGITALOCEAN_APP_ID_VAR; do
            if [[ -n "${!name:-}" ]]; then
              echo "${name}=available"
            else
              echo "${name}=missing"
            fi
          done
          do_token=false
          cf_token=false
          cf_account=false
          if [[ -n "${DIGITALOCEAN_ACCESS_TOKEN}" || -n "${DIGITALOCEAN_TOKEN}" || -n "${DO_API_TOKEN}" ]]; then do_token=true; fi
          if [[ -n "${CLOUDFLARE_API_TOKEN}" || -n "${CF_API_TOKEN}" ]]; then cf_token=true; fi
          if [[ -n "${CLOUDFLARE_ACCOUNT_ID_SECRET}" || -n "${CF_ACCOUNT_ID_SECRET}" || -n "${CLOUDFLARE_ACCOUNT_ID_VAR}" || -n "${CF_ACCOUNT_ID_VAR}" ]]; then cf_account=true; fi
          echo "digitalocean_token_available=${do_token}"
          echo "cloudflare_token_available=${cf_token}"
          echo "cloudflare_account_available=${cf_account}"
